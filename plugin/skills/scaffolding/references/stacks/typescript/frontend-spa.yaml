apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: frontend-spa
  title: Standalone Frontend — Alpine + HTMX or Vite + Svelte SPA
  description: |
    Interactive UI that pairs with a separate backend template.
    Server-rendered HTML with progressive interactivity (Alpine +
    HTMX) or a standalone client-side SPA (Vite + Svelte). Use for
    prototypes, admin UIs, internal tools, and small apps where
    SvelteKit would be overkill.
  tags:
    - typescript
    - frontend-spa
  links:
    - url: https://alpinejs.dev/
      title: Alpine.js
    - url: https://htmx.org/
      title: HTMX
    - url: https://vite.dev/
      title: Vite
    - url: https://svelte.dev/
      title: Svelte
spec:
  owner: abp
  type: website
  parameters:
    - title: Stack Configuration
      required:
        - mode
        - backend
      properties:
        mode:
          title: Mode
          type: string
          enum:
            - alpine-htmx
            - vite-svelte-spa
          enumNames:
            - 'Alpine + HTMX — server-rendered HTML; backend renders'
            - 'Vite + Svelte SPA — standalone client-side app'
        backend:
          title: Paired Backend
          description: |
            Name the backend template this frontend pairs with.
            Required for alpine-htmx (the backend renders); for
            vite-svelte-spa, this is the API the SPA talks to.
          type: string
          enum:
            - edge-api-cf-hono
            - api-fastapi
            - web-django
            - api-sinatra
            - web-rails
            - api-javalin
            - service-spring-boot
            - api-ktor
            - service-ktor
            - api-go-stdlib
            - service-fiber
            - api-axum
            - service-axum
            - api-aspnet-minimal
            - web-aspnet-mvc
            - api-giraffe
            - web-saturn
            - api-plug-bandit
            - web-phoenix
            - api-ring-reitit
            - service-clojure
            - external
          enumNames:
            - 'edge-api-cf-hono — Hono on Cloudflare Workers'
            - 'api-fastapi — FastAPI'
            - 'web-django — Django (templates available natively)'
            - 'api-sinatra — Ruby Sinatra'
            - 'web-rails — Ruby on Rails (Hotwire available natively)'
            - 'api-javalin — Java/Kotlin Javalin'
            - 'service-spring-boot — Java/Kotlin Spring Boot'
            - 'api-ktor — Kotlin Ktor (coroutine-first)'
            - 'service-ktor — Kotlin Ktor + Koin/Exposed/OTel stack'
            - 'api-go-stdlib — Go net/http'
            - 'service-fiber — Go Fiber (Express-style middleware, FastHTTP)'
            - 'api-axum — Rust Axum'
            - 'service-axum — Rust Axum service stack'
            - 'api-aspnet-minimal — C# ASP.NET Minimal APIs'
            - 'web-aspnet-mvc — C# ASP.NET MVC / Razor / Blazor'
            - 'api-giraffe — F# Giraffe'
            - 'web-saturn — F# Saturn'
            - 'api-plug-bandit — Elixir Plug + Bandit'
            - 'web-phoenix — Elixir Phoenix (LiveView available natively)'
            - 'api-ring-reitit — Clojure Ring + Reitit'
            - 'service-clojure — Clojure Ring + Reitit + Integrant stack'
            - 'External — name it (other Ruby/Python/JVM/etc. framework)'
        hosting_target:
          title: Hosting Target
          description: |
            For vite-svelte-spa only; for alpine-htmx the backend hosts.
          type: string
          default: served-by-backend
          enum:
            - served-by-backend
            - cloudflare-pages
            - vercel
            - static-host
          enumNames:
            - 'Served by backend (alpine-htmx)'
            - 'Cloudflare Pages'
            - 'Vercel'
            - 'Static host (S3+CloudFront, Netlify, etc.)'
        state_management:
          title: State Management
          description: |
            Alpine reactivity or Svelte stores are usually enough.
          type: string
          default: none
          enum:
            - none
          enumNames:
            - 'None — default'
  tooling:
    package_manager: pnpm-or-backend-native
    language_flavor: typescript-or-html
    test_runner: vitest-for-svelte-spa
    lint_format: biome-or-backend-native
    deploy_cli: depends-on-mode
  smoke_test: |
    alpine-htmx: a page with one Alpine component toggles visible
    state on click. vite-svelte-spa: a Vitest component test renders
    the root component and asserts a rendered string.
  switch_when: |
    UI has its own routes, SSR, server endpoints, or significant
    client-server data flow → fullstack-sveltekit.
