apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: web-aspnet-mvc
  title: C# — ASP.NET Core MVC / Razor / Blazor (full-stack)
  description: |
    Server-rendered C# web app with MVC controllers + Razor views,
    Razor Pages, or Blazor (Server / WASM / Static SSR). Pick this
    when controllers, model binding, server-rendered HTML, or
    interactive Blazor components are the killer features.
  tags:
    - csharp
    - web
    - aspnet
    - mvc
    - blazor
  links:
    - url: https://learn.microsoft.com/en-us/aspnet/core/
      title: ASP.NET Core
    - url: https://learn.microsoft.com/en-us/aspnet/core/blazor/
      title: Blazor
    - url: https://learn.microsoft.com/en-us/aspnet/core/blazor/components/render-modes
      title: Blazor render modes (incl. Static SSR)
    - url: https://learn.microsoft.com/en-us/nuget/consume-packages/central-package-management
      title: Central Package Management
spec:
  owner: abp
  type: website
  parameters:
    - title: Stack Configuration
      required:
        - render_mode
        - database
      properties:
        backend:
          title: Backend
          type: string
          const: aspnet-mvc
        frontend:
          title: Frontend
          type: string
          const: server-rendered-templates
          description: |
            Razor or Blazor depending on render_mode.
        render_mode:
          title: Render Mode
          type: string
          enum:
            - mvc-razor
            - razor-pages
            - blazor-server
            - blazor-wasm
            - blazor-static-ssr
          enumNames:
            - 'MVC + Razor views — controllers + views'
            - 'Razor Pages — page-based, lighter than MVC'
            - 'Blazor Server — stateful SignalR-backed'
            - 'Blazor WASM — client-owned runtime'
            - 'Blazor Static SSR — content + targeted interactivity'
        database:
          title: Database
          type: string
          enum:
            - postgres
            - sqlserver
            - sqlite
          enumNames:
            - 'Postgres — Npgsql provider'
            - 'SQL Server — first-party provider'
            - 'SQLite'
        persistence:
          title: Persistence
          type: string
          default: ef-core
          enum:
            - ef-core
            - dapper
          enumNames:
            - 'Entity Framework Core — full ORM'
            - 'Dapper — micro-ORM, hand-written SQL'
        background_jobs:
          title: Background Jobs
          type: string
          default: hosted-service
          enum:
            - hosted-service
            - hangfire
            - none
          enumNames:
            - 'IHostedService — built-in'
            - 'Hangfire — durable, dashboard, retries'
            - 'None'
        auth:
          title: Authentication
          type: string
          default: aspnet-identity
          enum:
            - aspnet-identity
            - jwt-bearer
            - none
          enumNames:
            - 'ASP.NET Core Identity — built-in user store'
            - 'JWT Bearer — token-based'
            - 'None'
        observability:
          title: Observability
          type: string
          default: none
          enum:
            - none
            - opentelemetry
          enumNames:
            - 'None'
            - 'OpenTelemetry'
  tooling:
    package_manager: dotnet-nuget
    language_flavor: csharp
    test_runner: xunit
    lint_format: dotnet-format
    runtime_cli: dotnet
  smoke_test: |
    GET / returns 200 with the welcome page. One xUnit +
    WebApplicationFactory integration test asserts the status.
  switch_when: |
    Compact API with no UI / controllers → api-aspnet-minimal.
    Cross-platform native client app → MAUI (future sibling).
