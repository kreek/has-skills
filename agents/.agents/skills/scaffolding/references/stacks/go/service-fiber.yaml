apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: service-fiber
  title: Go — Fiber + opinionated service stack
  description: |
    Express-style Go service built on Fiber: chained middleware,
    `c *fiber.Ctx` handlers, FastHTTP under the hood, and a broad
    first-party middleware ecosystem. Pick this when Express-shape
    ergonomics and high throughput matter more than net/http
    compatibility.

    Fiber handlers do NOT match the stdlib `net/http.Handler`
    signature; middleware ecosystems are separate. If you need
    drop-in net/http compatibility (for tooling or shared
    middleware), use api-go-stdlib instead.
  tags:
    - go
    - service
    - fiber
spec:
  owner: abp
  type: service
  parameters:
    - title: Stack Configuration
      required:
        - database
      properties:
        backend:
          title: Backend
          type: string
          const: fiber
        frontend:
          title: Frontend
          type: string
          const: api-only
        database:
          title: Database
          type: string
          enum:
            - postgres
            - sqlite
            - mysql
          enumNames:
            - 'Postgres — pgx driver'
            - 'SQLite'
            - 'MySQL'
        persistence:
          title: Persistence Library
          type: string
          default: gorm
          enum:
            - gorm
            - sqlx
            - ent
            - sqlc
          enumNames:
            - 'GORM — full ORM, common with Fiber'
            - 'sqlx — extensions over database/sql'
            - 'Ent — Facebook entity framework'
            - 'sqlc — generated typed code from SQL'
        background_jobs:
          title: Background Jobs
          type: string
          default: asynq
          enum:
            - asynq
            - river
            - none
          enumNames:
            - 'Asynq — Redis-backed, mature'
            - 'River — Postgres-backed (matches DB choice)'
            - 'None'
        auth:
          title: Authentication
          type: string
          default: fiber-jwt
          enum:
            - fiber-jwt
            - fiber-keyauth
            - oidc
            - none
          enumNames:
            - 'gofiber/contrib/jwt — JWT middleware'
            - 'gofiber/keyauth — API-key middleware'
            - 'OIDC — go-oidc client + Fiber middleware'
            - 'None'
        observability:
          title: Observability
          type: string
          default: opentelemetry
          enum:
            - opentelemetry
            - slog
            - none
          enumNames:
            - 'OpenTelemetry — fiberotel middleware + otel SDK'
            - 'log/slog — structured logging via fiberzerolog/fiberzap'
            - 'None'
  tooling:
    package_manager: go-modules
    language_flavor: go
    test_runner: go-test
    lint_format: gofmt-go-vet-staticcheck
    runtime_cli: go
  smoke_test: |
    GET /health returns 200. One Go test uses Fiber's app.Test()
    helper to invoke the handler and asserts the response.
  switch_when: |
    Need drop-in net/http compatibility, shared middleware with
    other net/http code, or stdlib-only minimalism → api-go-stdlib.
    Need a non-Express handler shape with structured router groups
    on net/http → consider Chi (future sibling).
