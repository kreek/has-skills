apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: edge-api-cf-hono
  title: Edge API — Cloudflare Workers + TypeScript + Hono
  description: |
    Small-to-medium APIs without long-running processes, special
    networking, region/data-residency requirements, conventional Node
    server semantics, or services outside Cloudflare.
  tags:
    - typescript
    - lightweight-api
    - cloudflare
spec:
  owner: abp
  type: service
  parameters:
    - title: Stack Configuration
      required:
        - database
      properties:
        backend:
          title: Backend
          type: string
          const: hono-on-cf-workers
        frontend:
          title: Frontend
          description: |
            For a richer UI, pair with frontend-spa or static-site-astro
            and host on Cloudflare Pages.
          type: string
          default: none
          enum:
            - none
            - astro
            - pages-spa
          enumNames:
            - 'None — API-only'
            - 'Astro — static + islands, served by Pages'
            - 'Pages SPA — built separately, served by Pages'
        database:
          title: Database
          type: string
          enum:
            - d1
            - turso
            - postgres-hyperdrive
          enumNames:
            - 'D1 — SQLite on Cloudflare, simplest'
            - 'Turso — libSQL, more features'
            - 'Postgres via Hyperdrive — external Postgres with connection pooling'
        background_jobs:
          title: Background Jobs
          type: string
          default: none
          enum:
            - none
            - cron-triggers
            - queues
            - durable-objects
          enumNames:
            - 'None'
            - 'Cron Triggers — scheduled tasks'
            - 'Queues — async work'
            - 'Durable Objects — stateful coordination'
  # ABP extensions (non-Backstage; agent-readable).
  tooling:
    package_manager: pnpm
    language_flavor: typescript-strict
    test_runner: vitest
    lint_format: biome
    deploy_cli: wrangler
  smoke_test: |
    GET /health returns 200. One Vitest test calls the Hono app fetch
    directly and asserts the status.
  switch_when: |
    WebSockets-as-shared-state across many connections, long-running
    requests beyond Workers' CPU-time limit, or libraries incompatible
    with the Workers runtime — switch to fullstack-sveltekit or a Node
    host.
