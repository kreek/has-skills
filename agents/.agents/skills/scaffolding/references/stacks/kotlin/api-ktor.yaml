apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: api-ktor
  title: Kotlin — Ktor (lightweight)
  description: |
    Coroutine-native Kotlin HTTP service built on Ktor + Netty.
    Pick this for Kotlin-first APIs where coroutine ergonomics,
    Kotlin DSL routing, and a small framework surface matter
    more than enterprise conventions.
  tags:
    - kotlin
    - lightweight-api
    - ktor
  links:
    - url: https://ktor.io/
      title: Ktor
    - url: https://docs.gradle.org/current/userguide/kotlin_dsl.html
      title: Gradle Kotlin DSL primer
    - url: https://kotlinlang.org/docs/home.html
      title: Kotlin
    - url: https://github.com/JetBrains/Exposed
      title: Exposed
spec:
  owner: abp
  type: service
  parameters:
    - title: Stack Configuration
      required:
        - engine
        - database
      properties:
        backend:
          title: Backend
          type: string
          const: ktor
        frontend:
          title: Frontend
          type: string
          const: api-only
        engine:
          title: HTTP Engine
          type: string
          enum:
            - netty
            - cio
            - jetty
          enumNames:
            - 'Netty — default; production-grade async I/O'
            - 'CIO — pure-Kotlin coroutine I/O, smaller dependency'
            - 'Jetty — when an existing JEE-shape deployment is required'
        database:
          title: Database
          type: string
          enum:
            - postgres
            - mysql
            - sqlite
            - h2
            - none
          enumNames:
            - 'Postgres — default for production'
            - 'MySQL'
            - 'SQLite'
            - 'H2 — embedded development DB'
            - 'None — stateless service'
        persistence:
          title: Persistence Library
          type: string
          default: exposed
          enum:
            - exposed
            - jooq
            - jdbi
            - none
          enumNames:
            - 'Exposed — JetBrains Kotlin SQL framework (DAO + DSL)'
            - 'jOOQ — typesafe SQL DSL'
            - 'JDBI — SQL with object mapping'
            - 'None — raw JDBC'
        background_jobs:
          title: Background Jobs
          type: string
          default: none
          enum:
            - none
            - quartz
          enumNames:
            - 'None'
            - 'Quartz — scheduled jobs'
        auth:
          title: Authentication
          type: string
          default: none
          enum:
            - none
            - ktor-jwt
            - ktor-sessions
          enumNames:
            - 'None'
            - 'JWT — ktor-server-auth-jwt'
            - 'Sessions — ktor-server-sessions'
        observability:
          title: Observability
          type: string
          default: call-logging
          enum:
            - call-logging
            - opentelemetry
            - none
          enumNames:
            - 'ktor-server-call-logging — request/response logging'
            - 'OpenTelemetry — call-logging + otel SDK'
            - 'None'
  tooling:
    package_manager: gradle
    build_dsl: kotlin
    language_flavor: kotlin
    test_runner: junit5-or-kotest
    lint_format: ktlint
    runtime_cli: gradle
  smoke_test: |
    GET /health returns 200. One JUnit 5 (or Kotest) test uses
    Ktor's testApplication { client.get(...) } harness to invoke
    the route in-process and asserts the response.
  switch_when: |
    Need richer service stack (DI via Koin, Exposed by default,
    OpenTelemetry baseline, structured auth) → service-ktor.
    Want Java-first conventions (auto-config, starters, actuator,
    Spring Data) with Kotlin source → java/service-spring-boot
    (set language_flavor: kotlin).
