apiVersion: backstage.io/v1alpha1
kind: Location
metadata:
  name: abp-stack-templates
  description: |
    ABP scaffolding stack templates. Each target is a Backstage
    Software Template (apiVersion: scaffolder.backstage.io/v1beta3)
    describing a named stack archetype with parameters the agent
    confirms with the user before scaffolding. The `default_for`
    map is an ABP extension that routes common request shapes to a
    starting template.
spec:
  type: url
  targets:
    # TypeScript
    - ./typescript/edge-api-cf-hono.yaml
    - ./typescript/fullstack-sveltekit.yaml
    - ./typescript/static-site-astro.yaml
    - ./typescript/frontend-spa.yaml
    # Python
    - ./python/api-fastapi.yaml
    - ./python/web-django.yaml
    # Java (JVM — Java-first frameworks; also support Kotlin source via language_flavor)
    - ./java/api-javalin.yaml
    - ./java/service-spring-boot.yaml
    # Kotlin (Kotlin-first frameworks — coroutine-native, Kotlin DSL routing)
    - ./kotlin/api-ktor.yaml
    - ./kotlin/service-ktor.yaml
    # Ruby
    - ./ruby/api-sinatra.yaml
    - ./ruby/web-rails.yaml
    # Go
    - ./go/api-go-stdlib.yaml
    - ./go/service-fiber.yaml
    # Rust
    - ./rust/api-axum.yaml
    - ./rust/service-axum.yaml
    # C# (.NET)
    - ./csharp/api-aspnet-minimal.yaml
    - ./csharp/web-aspnet-mvc.yaml
    # F# (.NET)
    - ./fsharp/api-giraffe.yaml
    - ./fsharp/web-saturn.yaml
    # Elixir
    - ./elixir/api-plug-bandit.yaml
    - ./elixir/web-phoenix.yaml
    # Clojure
    - ./clojure/api-ring-reitit.yaml
    - ./clojure/service-clojure.yaml
  # ABP extension — not part of the Backstage Location spec.
  # Maps a fresh-project request shape to its starting (lightweight)
  # template. The agent looks up default_for[<trigger>] when the
  # user's request matches one of these archetypes.
  default_for:
    fresh-typescript-web: edge-api-cf-hono
    fresh-python-web: api-fastapi
    fresh-small-frontend: frontend-spa
    fresh-java-service: api-javalin
    fresh-kotlin-service: api-ktor
    fresh-ruby-service: api-sinatra
    fresh-go-service: api-go-stdlib
    fresh-rust-service: api-axum
    fresh-csharp-web: api-aspnet-minimal
    fresh-fsharp-web: api-giraffe
    fresh-elixir-web: api-plug-bandit
    fresh-clojure-service: api-ring-reitit
