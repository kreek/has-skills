apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: service-axum
  title: Rust — Axum + opinionated service stack
  description: |
    Rust service built on Axum with an opinionated stack: tower-http
    middleware (compression, CORS, request-id, timeouts), sqlx or
    SeaORM persistence, tracing + OpenTelemetry by default, and
    graceful shutdown. Same handler shape as the lightweight tier.
  tags:
    - rust
    - service
    - axum
spec:
  owner: abp
  type: service
  parameters:
    - title: Stack Configuration
      required:
        - database
      properties:
        backend:
          title: Backend
          type: string
          const: axum
        frontend:
          title: Frontend
          type: string
          const: api-only
        database:
          title: Database
          type: string
          enum:
            - postgres
            - sqlite
            - mysql
          enumNames:
            - 'Postgres — default'
            - 'SQLite'
            - 'MySQL'
        persistence:
          title: Persistence Library
          type: string
          default: sea-orm
          enum:
            - sea-orm
            - sqlx
          enumNames:
            - 'SeaORM — async-first ORM with relations + migrations + CLI'
            - 'sqlx — query-first, compile-time-checked SQL'
        background_jobs:
          title: Background Jobs
          type: string
          default: apalis
          enum:
            - apalis
            - none
          enumNames:
            - 'apalis — pluggable backends (Redis, Postgres, SQS)'
            - 'None'
        auth:
          title: Authentication
          type: string
          default: jsonwebtoken
          enum:
            - jsonwebtoken
            - oidc
            - none
          enumNames:
            - 'jsonwebtoken — JWT middleware'
            - 'OpenID Connect — openidconnect crate'
            - 'None'
        observability:
          title: Observability
          type: string
          default: opentelemetry
          enum:
            - opentelemetry
            - tracing
          enumNames:
            - 'OpenTelemetry — tracing + otel SDK + metrics/traces'
            - 'tracing — structured logs/spans only'
  tooling:
    package_manager: cargo
    language_flavor: rust
    test_runner: cargo-test
    lint_format: rustfmt-clippy
    runtime_cli: cargo
  smoke_test: |
    GET /health returns 200. One Rust test uses tower::ServiceExt
    `oneshot` and asserts the response. Tracing subscriber is
    initialised in the test harness.
  switch_when: |
    Truly minimal API with no middleware/observability stack →
    api-axum. Actor model or alternate runtime → Actix Web (future
    sibling).
