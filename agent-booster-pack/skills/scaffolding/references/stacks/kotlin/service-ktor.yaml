apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: service-ktor
  title: Kotlin — Ktor + opinionated service stack
  description: |
    Kotlin service built on Ktor + Netty with an opinionated stack:
    Koin for DI, Exposed for persistence (with HikariCP pool),
    ktor-server-auth-jwt for auth, OpenTelemetry by default, and
    Quartz for scheduling. Same coroutine-native handler shape as
    the lightweight tier; the larger surface comes from the
    additional libraries rather than a heavier framework.
  tags:
    - kotlin
    - service
    - ktor
    - koin
  links:
    - url: https://ktor.io/
      title: Ktor
    - url: https://insert-koin.io/
      title: Koin
    - url: https://github.com/JetBrains/Exposed
      title: Exposed
    - url: https://opentelemetry.io/docs/languages/java/
      title: OpenTelemetry JVM
    - url: https://docs.gradle.org/current/userguide/kotlin_dsl.html
      title: Gradle Kotlin DSL primer
spec:
  owner: abp
  type: service
  parameters:
    - title: Stack Configuration
      required:
        - database
      properties:
        backend:
          title: Backend
          type: string
          const: ktor
        frontend:
          title: Frontend
          type: string
          const: api-only
        engine:
          title: HTTP Engine
          type: string
          default: netty
          enum:
            - netty
            - cio
          enumNames:
            - 'Netty — default'
            - 'CIO — pure-Kotlin coroutine I/O'
        database:
          title: Database
          type: string
          enum:
            - postgres
            - mysql
            - sqlite
          enumNames:
            - 'Postgres — default for production'
            - 'MySQL'
            - 'SQLite'
        persistence:
          title: Persistence Library
          type: string
          default: exposed
          enum:
            - exposed
            - jooq
          enumNames:
            - 'Exposed — JetBrains Kotlin SQL framework + HikariCP pool'
            - 'jOOQ — typesafe SQL DSL'
        di:
          title: Dependency Injection
          type: string
          default: koin
          enum:
            - koin
            - kodein
            - none
          enumNames:
            - 'Koin — pragmatic Kotlin DI, default'
            - 'Kodein — alternative Kotlin DI container'
            - 'None — manual wiring'
        background_jobs:
          title: Background Jobs
          type: string
          default: quartz
          enum:
            - quartz
            - none
          enumNames:
            - 'Quartz — durable scheduled jobs'
            - 'None'
        auth:
          title: Authentication
          type: string
          default: ktor-jwt
          enum:
            - ktor-jwt
            - ktor-sessions
            - oauth
            - none
          enumNames:
            - 'JWT — ktor-server-auth-jwt'
            - 'Sessions — ktor-server-sessions'
            - 'OAuth — ktor-server-auth-oauth'
            - 'None'
        observability:
          title: Observability
          type: string
          default: opentelemetry
          enum:
            - opentelemetry
            - call-logging
          enumNames:
            - 'OpenTelemetry — JVM SDK + ktor instrumentation'
            - 'ktor-server-call-logging — structured logging only'
  tooling:
    package_manager: gradle
    build_dsl: kotlin
    language_flavor: kotlin
    test_runner: junit5-or-kotest
    lint_format: ktlint
    runtime_cli: gradle
  smoke_test: |
    GET /health returns 200. One JUnit 5 (or Kotest) test boots the
    Koin container via Ktor's testApplication, invokes the route,
    and asserts the response.
  switch_when: |
    Truly minimal Kotlin API with no DI / observability stack →
    api-ktor. Need Spring Boot conventions (auto-config, Spring
    Data, Actuator, broad starters) → java/service-spring-boot
    (set language_flavor: kotlin).
