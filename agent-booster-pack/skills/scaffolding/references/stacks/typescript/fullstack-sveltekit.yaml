apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: fullstack-sveltekit
  title: Fullstack — TypeScript + SvelteKit
  description: |
    Web app with both UI and server endpoints in one repo. SSR +
    progressive enhancement. One framework end-to-end.
  tags:
    - typescript
    - fullstack
    - sveltekit
  links:
    - url: https://svelte.dev/docs/kit
      title: SvelteKit
    - url: https://pnpm.io/
      title: pnpm
    - url: https://vitest.dev/
      title: Vitest
    - url: https://playwright.dev/
      title: Playwright
spec:
  owner: abp
  type: website
  parameters:
    - title: Stack Configuration
      required:
        - hosting_adapter
        - database
      properties:
        backend:
          title: Backend
          type: string
          const: sveltekit-endpoints
        frontend:
          title: Frontend
          type: string
          const: sveltekit-svelte5
        hosting_adapter:
          title: Hosting Adapter
          type: string
          enum:
            - adapter-cloudflare
            - adapter-node
            - adapter-vercel
          enumNames:
            - 'Cloudflare — CF Pages + Workers'
            - 'Node — any Node host (Fly, Render, container, VPS)'
            - 'Vercel'
        database:
          title: Database
          type: string
          enum:
            - postgres
            - sqlite
            - turso
          enumNames:
            - 'Postgres — default for production'
            - 'SQLite — local-first / single-tenant'
            - 'Turso — libSQL, edge-replicated'
        background_jobs:
          title: Background Jobs
          type: string
          default: none
          enum:
            - none
            - inngest
            - trigger-dev
            - host-cron
          enumNames:
            - 'None'
            - 'Inngest'
            - 'Trigger.dev'
            - 'Host-native cron via the chosen adapter'
        auth:
          title: Authentication
          type: string
          default: none
          enum:
            - none
            - better-auth
          enumNames:
            - 'None — hand-rolled with sessions if needed'
            - 'Better Auth'
  tooling:
    package_manager: pnpm
    language_flavor: typescript-strict
    test_runner: vitest+playwright
    lint_format: biome
    deploy_cli: adapter-specific
  smoke_test: |
    Root route renders a page with a known string. One Vitest test
    loads the route and asserts the string. One Playwright smoke test
    boots the dev server and visits the page.
  switch_when: |
    API has no UI and edge latency matters → edge-api-cf-hono.
    Content-heavy with minimal interactivity → static-site-astro.
