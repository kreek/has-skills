apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: static-site-astro
  title: Static Site — Astro
  description: |
    Marketing pages, blogs, docs sites, content-heavy projects with
    light interactivity. Output is static HTML; islands hydrate only
    what needs interactivity.
  tags:
    - typescript
    - static-site
    - astro
  links:
    - url: https://docs.astro.build/
      title: Astro
    - url: https://pnpm.io/
      title: pnpm
spec:
  owner: abp
  type: website
  parameters:
    - title: Stack Configuration
      required:
        - content_source
      properties:
        backend:
          title: Backend
          type: string
          const: none-static
        frontend:
          title: Frontend
          type: string
          const: astro
        content_source:
          title: Content Source
          type: string
          enum:
            - markdown-mdx
            - headless-cms
          enumNames:
            - 'Markdown / MDX files in the repo'
            - 'Headless CMS (Sanity, Contentful, etc.) — name the choice'
        islands_framework:
          title: Islands Framework
          type: string
          default: none
          enum:
            - none
            - alpine
            - svelte
            - react
          enumNames:
            - 'None — plain HTML'
            - 'Alpine — lightweight reactivity'
            - 'Svelte islands'
            - 'React islands'
        database:
          title: Database
          type: string
          default: none
          enum:
            - none
            - external-forms-backend
          enumNames:
            - 'None — default for static sites'
            - 'External — serverless function or service for form submissions'
        hosting:
          title: Hosting
          type: string
          default: cloudflare-pages
          enum:
            - cloudflare-pages
            - vercel
            - netlify
            - static-host
          enumNames:
            - 'Cloudflare Pages — default'
            - 'Vercel'
            - 'Netlify'
            - 'Any static host (S3+CloudFront, GitHub Pages, etc.)'
  tooling:
    package_manager: pnpm
    language_flavor: typescript
    test_runner: vitest
    lint_format: biome
    deploy_cli: astro
  smoke_test: |
    Build produces an index.html with expected content. One Vitest
    test asserts a content-loader function returns the expected shape.
  switch_when: |
    Significant per-page interactivity or authenticated user surface →
    fullstack-sveltekit. Backend with no UI → edge-api-cf-hono or
    api-fastapi.
